# ============================================
# POLARIS API - Application Configuration
# ============================================

# Server
server.port=8080

# Application
spring.application.name=polaris-api

# ============================================
# Database - H2 (Development)
# ============================================
spring.datasource.url=jdbc:h2:file:./data/polarisdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
jwt.secret=PolarisTPASecretKey2026ForJWTTokenGenerationAndValidation
jwt.expiration=86400000

# ============================================
# CORS
# ============================================
cors.allowed-origins=http://localhost:3000,http://localhost:3001,https://polaris-tpa.azurewebsites.net

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# Logging
# ============================================
logging.level.com.polaris=DEBUG
logging.level.org.springframework.security=INFO
