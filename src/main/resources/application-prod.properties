# ═══════════════════════════════════════════════════════════════
# Polaris API - Production Configuration (PostgreSQL)
# ═══════════════════════════════════════════════════════════════

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://${AZURE_POSTGRESQL_HOST:localhost}:5432/${AZURE_POSTGRESQL_DB:polaris}
spring.datasource.username=${AZURE_POSTGRESQL_USER:polaris_admin}
spring.datasource.password=${AZURE_POSTGRESQL_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JWT
jwt.secret=${JWT_SECRET:polaris-jwt-secret-key-2025-production}
jwt.expiration=86400000

# CORS
cors.allowed-origins=${CORS_ORIGINS:https://polaris-tpa.azurewebsites.net,http://localhost:3000,http://localhost:3001}

# Server
server.port=${PORT:8080}

# Disable H2 in production
spring.h2.console.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.polaris.api=INFO
